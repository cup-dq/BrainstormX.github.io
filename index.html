<script>
if (sessionStorage.getItem('hasRedirected')) {
    // 已经跳转过，不执行meta跳转
    document.write('<meta name="robots" content="noindex">');
} else {
    // 第一次打开，0秒自动跳转
    sessionStorage.setItem('hasRedirected', 'true');
    document.write('<meta http-equiv="refresh" content="0; url=/Home/">');
}
</script>
